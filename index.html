<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Acceso privado 🚫</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg1:#0b0b10; --bg2:#1b1b2f; --card:#ffffff0f; --border:#ffffff24;
      --accent:#ffd1dc;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto;
      min-height:100vh;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      color:#f6f6f7;
      display:flex; align-items:center; justify-content:center;
    }
    .wrap{max-width:720px; width:100%; padding:24px;}
    .card{
      background:var(--card); border:1px solid var(--border);
      border-radius:22px; padding:28px; box-shadow:0 18px 60px #0006;
    }
    h1{margin:0 0 6px; font-size:2rem; text-align:center}
    .sub{opacity:.85; text-align:center; margin-bottom:18px}
    .row{display:flex; gap:10px; justify-content:center}
    input{
      flex:1; max-width:360px; padding:14px 16px; border-radius:999px;
      border:1px solid var(--border); background:#0000; color:#fff;
      outline:none;
    }
    button{
      padding:14px 22px; border-radius:999px; border:none; cursor:pointer;
      background:linear-gradient(135deg, #ffb6c1, var(--accent));
      font-weight:600;
    }
    .err{color:#ffb3b3; text-align:center; display:none; margin-top:10px}
    .hidden{display:none}
    .fade{animation:fade .9s ease}
    @keyframes fade{from{opacity:0; transform:translateY(10px)}
                    to{opacity:1; transform:translateY(0)}}
    .center{text-align:center}
    .soft{opacity:.9; line-height:1.6}
  </style>
</head>
<body>
  <div class="wrap">
    <!-- PANTALLA 1: ACCESO -->
    <section id="gate" class="card fade">
      <h1>Acceso privado</h1>
      <p class="sub">Solo para 🐘</p>

      <div class="row">
        <input id="pwd" type="password" placeholder="Contraseña" />
        <button onclick="enter()">Entrar</button>
      </div>
      <p id="err" class="err">Contraseña incorrecta 💔</p>
    </section>

    <!-- PANTALLA 2: CONTENIDO -->
    <section id="content" class="card fade hidden">
      <h1>MI VIDA</h1>
      <p class="soft center">
       Quiero que sepas algo<br/>
        Todos los días 
        te pienso,
        te extraño,
        te elijo,
        te espero,
        te amo.
      </p>
      <audio id="bgm" src="audio.mp3" preload="auto"></audio>
      <!-- Aquí luego agregamos heterei, contador y “te elijo todos los días” -->
    </section>
  </div>

  <script>
    // 🔐 CAMBIA AQUÍ LA CONTRASEÑA
    const PASSWORD = "HOGAR";

    function enter(){
      const v = document.getElementById('pwd').value;
      if(v === PASSWORD){
        document.getElementById('gate').classList.add('hidden');
        const c = document.getElementById('content');
        c.classList.remove('hidden');
        document.getElementById('bgm').play().catch(()=>{});
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }
  </script>
</body>
</html>
